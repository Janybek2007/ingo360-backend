version: '3.8'
services:
  back:
    build: .
    expose:
      - '8000'
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    restart: always
    env_file:
      - .env

  db:
    # image: postgres:17-alpine
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    volumes:
      - ./postgres:/var/lib/postgresql/data
      # - postgres_data:/var/lib/postgresql/data
    expose:
      - '5432'

  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - '6379'
    volumes:
      - redis:/data
    command: redis-server --appendonly yes

  celery_worker:
    build: .
    command: celery -A src.celery_app worker --loglevel=info
    volumes:
      - .:/app
      - ./temp_uploads:/app/temp_uploads
    depends_on:
      - db
      - redis
    restart: always
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /home/basic/ingo360-frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.ssl.conf:/etc/nginx/nginx.conf
      # - ./nginx/nginx.nossl.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - back
    restart: always
volumes:
  postgres:
  # postgres_data:
  redis:
