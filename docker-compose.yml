services:
  back:
    build: .
    expose:
      - '8000'
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      # ⚠️ поменяй /health если у тебя другой endpoint
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1:8000${API_VERSION}/health || exit 1'
        ]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 20s

  db:
    # image: postgres:17-alpine
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./postgres:/var/lib/postgresql/data
      # - postgres_data:/var/lib/postgresql/data
    expose:
      - '5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres} -h 127.0.0.1 -p 5432'
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - '6379'
    volumes:
      - redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  celery_worker:
    build: .
    # image: ingo360-backend-back
    command: celery -A src.celery_app worker --loglevel=info
    volumes:
      - .:/app
      - ./temp:/app/temp
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /home/basic/ingo360-frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.ssl.conf:/etc/nginx/nginx.conf
      # - ./nginx/nginx.nossl.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      back:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres:
  # postgres_data:
  redis:
