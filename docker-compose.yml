version: '3.8'
services:
  back:
    build: .
    expose:
     - "8000"
    volumes:
     - .:/app
    depends_on:
      - db
    restart: always
    env_file:
      - .env

  db:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    volumes:
      - ./postgres:/var/lib/postgresql/data
    expose:
      - "5432"
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/basic/ingo360-frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.ssl.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - back
    restart: always
volumes:
  postgres:
