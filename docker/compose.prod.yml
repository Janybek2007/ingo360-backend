services:
  back:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: ingo360_back
    volumes:
      - temp:/app/temp
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 40s

  db:
    image: postgres:15-alpine
    container_name: ingo360_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres} -h 127.0.0.1 -p 5432",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ingo360_redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  celery_worker:
    image: ingo360-backend:prod
    container_name: ingo360_celery_worker
    command: celery -A src.celery_app worker --loglevel=info
    volumes:
      - temp:/app/temp
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    env_file:
      - ../.env

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: ingo360_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/basic/ingo360-frontend/dist:/usr/share/nginx/html:ro
      - ../nginx/nginx.ssl.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      back:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres:
  redis:
  temp:
